name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - feat/**

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.2.2
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.11"
          enable-cache: true
      - name: Install backend dependencies
        run: uv sync --extra dev
      - name: Ruff
        run: uv run ruff check
      - name: Pytest
        run: uv run pytest

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.2.2
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4.1.0
        with:
          version: 10.30.3
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
      - name: Frontend tests
        run: |
          if node -e "process.exit(require('./frontend/package.json').scripts?.test ? 0 : 1)"; then
            pnpm --dir frontend run test --run
          else
            echo "frontend/package.json has no test script on this branch; skipping."
          fi
      - name: Frontend build
        run: pnpm ui:build
      - name: Install Playwright browser
        run: pnpm --dir frontend exec playwright install --with-deps chromium
      - name: Frontend e2e
        run: pnpm --dir frontend run e2e

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.2.2
      - name: Build control plane image
        run: docker build --target plane -t onestep-control-plane:ci .

  smoke:
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
      - docker
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.2.2
      - name: Prepare env
        run: cp .env.example .env
      - name: Preflight
        run: bash scripts/release-preflight.sh --compose-file docker-compose.yml --env-file .env
      - name: Smoke
        env:
          SMOKE_BUILD: "1"
          SMOKE_MANAGE_STACK: "1"
          SMOKE_CLEANUP: "1"
        run: bash scripts/run-smoke.sh --compose-file docker-compose.yml --env-file .env

  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    needs:
      - smoke
    if: >
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.2.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v3.6.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v3.11.1

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v5.8.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/onestep-control-plane
          tags: |
            type=raw,value=latest
            type=sha,format=long

      - name: Build and push control plane image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.18.0
        with:
          context: .
          file: ./Dockerfile
          target: plane
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
