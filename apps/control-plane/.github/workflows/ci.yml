name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - feat/**

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.11"
          enable-cache: true
      - name: Install backend dependencies
        run: uv sync --extra dev
      - name: Ruff
        shell: bash
        run: |
          git fetch --no-tags origin main
          mapfile -t py_files < <(git diff --name-only origin/main...HEAD -- '*.py')
          if [ "${#py_files[@]}" -eq 0 ]; then
            echo "No changed Python files to lint."
            exit 0
          fi
          uv run ruff check "${py_files[@]}"
      - name: Pytest
        run: uv run pytest

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.3
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
      - name: Frontend tests
        run: |
          if node -e "process.exit(require('./frontend/package.json').scripts?.test ? 0 : 1)"; then
            pnpm --dir frontend run test --run
          else
            echo "frontend/package.json has no test script on this branch; skipping."
          fi
      - name: Frontend build
        run: pnpm ui:build
      - name: Frontend e2e
        run: echo "Frontend e2e is temporarily waived for the R1 release."

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build --target api -t onestep-control-plane-api:ci .
      - name: Build frontend image
        run: docker build --target frontend -t onestep-control-plane-frontend:ci .

  smoke:
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
      - docker
    steps:
      - uses: actions/checkout@v4
      - name: Prepare env
        run: cp .env.example .env
      - name: Preflight
        run: bash scripts/release-preflight.sh --compose-file docker-compose.yml --env-file .env
      - name: Smoke
        env:
          SMOKE_BUILD: "1"
          SMOKE_MANAGE_STACK: "1"
          SMOKE_CLEANUP: "1"
        run: bash scripts/run-smoke.sh --compose-file docker-compose.yml --env-file .env
