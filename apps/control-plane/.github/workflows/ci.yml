name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - feat/**

permissions:
  contents: read
  packages: write

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.11"
          enable-cache: true
      - name: Install backend dependencies
        run: uv sync --extra dev
      - name: Ruff
        run: uv run ruff check
      - name: Pytest
        run: uv run pytest

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.3
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
      - name: Frontend tests
        run: |
          if node -e "process.exit(require('./frontend/package.json').scripts?.test ? 0 : 1)"; then
            pnpm --dir frontend run test --run
          else
            echo "frontend/package.json has no test script on this branch; skipping."
          fi
      - name: Frontend build
        run: pnpm ui:build
      - name: Install Playwright browser
        run: pnpm --dir frontend exec playwright install --with-deps chromium
      - name: Frontend e2e
        run: pnpm --dir frontend run e2e

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build --target api -t onestep-control-plane-api:ci .
      - name: Build frontend image
        run: docker build --target frontend -t onestep-control-plane-frontend:ci .

  smoke:
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
      - docker
    steps:
      - uses: actions/checkout@v4
      - name: Prepare env
        run: cp .env.example .env
      - name: Preflight
        run: bash scripts/release-preflight.sh --compose-file docker-compose.yml --env-file .env
      - name: Smoke
        env:
          SMOKE_BUILD: "1"
          SMOKE_MANAGE_STACK: "1"
          SMOKE_CLEANUP: "1"
        run: bash scripts/run-smoke.sh --compose-file docker-compose.yml --env-file .env

  publish:
    runs-on: ubuntu-latest
    needs:
      - smoke
    if: >
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (api)
        id: meta_api
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/onestep-control-plane-api
          tags: |
            type=raw,value=latest
            type=sha,format=long

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: api
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta_api.outputs.tags }}
          labels: ${{ steps.meta_api.outputs.labels }}

      - name: Docker metadata (frontend)
        id: meta_frontend
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/onestep-control-plane-frontend
          tags: |
            type=raw,value=latest
            type=sha,format=long

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: frontend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta_frontend.outputs.tags }}
          labels: ${{ steps.meta_frontend.outputs.labels }}
