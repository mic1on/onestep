name: Release Smoke

on:
  workflow_dispatch:
    inputs:
      compose_file:
        description: Compose file to validate
        required: true
        default: docker-compose.deploy.yml
        type: choice
        options:
          - docker-compose.deploy.yml
          - docker-compose.yml
      env_file:
        description: Env file to load
        required: true
        default: .env.deploy
        type: string
      manage_stack:
        description: Start services as part of the smoke run
        required: true
        default: true
        type: boolean
      cleanup:
        description: Tear the stack down after the smoke run
        required: true
        default: false
        type: boolean

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Preflight
        run: bash scripts/release-preflight.sh --compose-file "${{ inputs.compose_file }}" --env-file "${{ inputs.env_file }}"
      - name: Release smoke
        env:
          SMOKE_MANAGE_STACK: ${{ inputs.manage_stack }}
          SMOKE_CLEANUP: ${{ inputs.cleanup }}
        run: bash scripts/run-smoke.sh --compose-file "${{ inputs.compose_file }}" --env-file "${{ inputs.env_file }}"
