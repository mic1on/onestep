name: Release

on:
  push:
    tags:
      - "v*"
      - "*.*.*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build release artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install release test dependencies
        run: uv sync --frozen --extra test

      - name: Run non-integration tests
        run: uv run pytest -q -m "not integration"

      - name: Smoke test worker image
        run: ./scripts/run-worker-image-smoke.sh

      - name: Build distributions
        run: uv build

      - name: Check distribution metadata
        run: uvx twine check dist/*

      - name: Smoke-install wheel
        run: |
          uv venv .release-smoke
          uv pip install --python .release-smoke/bin/python dist/*.whl 'PyYAML>=6.0'
          .release-smoke/bin/onestep --version
          .release-smoke/bin/onestep check example.cli_app:app
          .release-smoke/bin/onestep check example/cli_app.yaml

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  github-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  worker-image:
    name: Publish worker image
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          MAJOR_MINOR="${VERSION%.*}"
          IMAGE_NAME="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/onestep-worker"
          {
            echo "VERSION=$VERSION"
            echo "MAJOR_MINOR=$MAJOR_MINOR"
            echo "IMAGE_NAME=$IMAGE_NAME"
          } >> "$GITHUB_ENV"

      - name: Build and push worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/worker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.VERSION }}
            ${{ env.IMAGE_NAME }}:${{ env.MAJOR_MINOR }}
            ${{ env.IMAGE_NAME }}:latest

  pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN || secrets.PYPI_TOKEN }}
