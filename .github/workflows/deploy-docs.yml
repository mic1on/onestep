name: Docs

on:
  push:
    branches:
      - main
      - docs
    paths:
      - ".github/workflows/deploy-docs.yml"
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect:
    name: Detect docs site
    runs-on: ubuntu-latest
    outputs:
      has_docs: ${{ steps.detect.outputs.has_docs }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect VitePress docs
        id: detect
        run: |
          if [ -f docs/package.json ]; then
            echo "has_docs=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_docs=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build docs
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.has_docs == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: docs/pnpm-lock.yaml

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install docs dependencies
        working-directory: docs
        run: |
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile
          else
            pnpm install --no-frozen-lockfile
          fi

      - name: Build VitePress site
        working-directory: docs
        run: pnpm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    name: Deploy docs
    runs-on: ubuntu-latest
    needs:
      - detect
      - build
    if: needs.detect.outputs.has_docs == 'true'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  no-docs:
    name: Skip docs deploy
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.has_docs != 'true'

    steps:
      - name: No docs directory present
        run: echo "docs/ is not present yet. Skipping docs deployment."
