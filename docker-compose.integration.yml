services:
  redis:
    image: redis:7.4-alpine
    container_name: onestep-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  rabbitmq:
    image: rabbitmq:4-management
    container_name: onestep-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  mysql:
    image: mysql:8.4
    container_name: onestep-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_ROOT_HOST: "%"
      MYSQL_DATABASE: onestep
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 30

  localstack:
    image: localstack/localstack:4.13.0
    container_name: onestep-localstack
    environment:
      SERVICES: sqs
      DEBUG: 0
      AWS_DEFAULT_REGION: us-east-1
    ports:
      - "4566:4566"
    healthcheck:
      test: ["CMD", "bash", "-lc", "curl -fsS http://127.0.0.1:4566/_localstack/health >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 20
